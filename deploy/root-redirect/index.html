<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#C47F0A">
    <title>Allegri.ch</title>
    <link rel="icon" type="image/png" href="ape.png">
    <link rel="apple-touch-icon" href="ape.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #FFF8E7 0%, #FFE9B0 50%, #F5C76A 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #4E342E;
        }
        .container {
            background: white;
            border-radius: 28px;
            padding: 48px 40px 40px;
            max-width: 540px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(78, 52, 46, 0.18);
            position: relative;
        }
        .bee-wrap {
            width: 220px;
            height: 220px;
            margin: -10px auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 4s ease-in-out infinite;
        }
        .bee-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 8px 20px rgba(196, 127, 10, 0.25));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-12px) rotate(1deg); }
        }
        h1 {
            color: #6D4C2E;
            font-size: 1.9em;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #A07855;
            font-size: 0.98em;
            margin-bottom: 32px;
        }
        .apps {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .app-link {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 22px;
            background: white;
            color: #6D4C2E;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1.02em;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            border: 2px solid #FFE082;
            box-shadow: 0 4px 14px rgba(196, 127, 10, 0.08);
        }
        .app-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(196, 127, 10, 0.22);
            border-color: #F5A623;
        }
        .app-link-icon {
            font-size: 1.7em;
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #FFE082, #F5A623);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .app-link-text {
            flex: 1;
            text-align: left;
        }
        .app-link-title {
            display: block;
            font-size: 1.08em;
            font-weight: 700;
            color: #4E342E;
        }
        .app-link-desc {
            display: block;
            font-size: 0.82em;
            color: #A07855;
            font-weight: 400;
            margin-top: 2px;
        }
        .app-link-arrow {
            font-size: 1.4em;
            color: #C47F0A;
            transition: transform 0.2s;
        }
        .app-link:hover .app-link-arrow {
            transform: translateX(4px);
        }
        footer {
            margin-top: 32px;
            padding-top: 18px;
            border-top: 1px solid #FFE082;
            font-size: 0.78em;
            color: #BCA28C;
        }
        @media (max-width: 480px) {
            .container { padding: 36px 22px 28px; border-radius: 22px; }
            h1 { font-size: 1.55em; }
            .bee-wrap { width: 170px; height: 170px; }
            .app-link { padding: 14px 16px; }
            .app-link-icon { width: 42px; height: 42px; font-size: 1.4em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bee-wrap">
            <img src="ape.png" alt="Apetta con vasetto di miele">
        </div>
        <h1>Benvenuto su Allegri.ch</h1>
        <p class="subtitle">Le mie applicazioni personali</p>

        <div class="apps">
            <a href="/apiario/" class="app-link">
                <span class="app-link-icon">🍯</span>
                <span class="app-link-text">
                    <span class="app-link-title">Pianificatore Apiario</span>
                    <span class="app-link-desc">Gestione apiari, arnie, diario e planner stagionale</span>
                </span>
                <span class="app-link-arrow">→</span>
            </a>
        </div>

        <footer>
            © Sandro Allegri · Ticino, Svizzera
        </footer>
    </div>
</body>
</html>
