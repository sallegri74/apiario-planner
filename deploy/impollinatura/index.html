<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#C47F0A">
    <meta name="robots" content="noindex, nofollow">
    <title>Servizio di impollinatura</title>
    <link rel="icon" type="image/png" href="ape.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --honey: #F5A623;
            --honey-light: #FFF3D6;
            --honey-dark: #C47F0A;
            --brown: #6D4C2E;
            --brown-dark: #4E342E;
            --cream: #FFF8E7;
            --gold: #FFE082;
            --text: #4E342E;
            --gray: #A07855;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #FFF8E7 0%, #FFE9B0 50%, #F5C76A 100%);
            min-height: 100vh;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            background: white;
            border-radius: 24px;
            max-width: 640px;
            width: 100%;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(78, 52, 46, 0.18);
            text-align: center;
        }
        .bee {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            animation: float 4s ease-in-out infinite;
        }
        .bee img {
            width: 100%; height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 8px 20px rgba(196, 127, 10, 0.25));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }
        h1 {
            color: var(--brown-dark);
            font-size: 2em;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: var(--gray);
            font-size: 1em;
            margin-bottom: 36px;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(78, 52, 46, 0.08);
            border: 1px solid var(--honey-light);
        }
        th {
            background: linear-gradient(135deg, var(--honey-light), var(--gold));
            color: var(--brown-dark);
            padding: 16px 20px;
            text-align: left;
            font-size: 1em;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        td {
            padding: 16px 20px;
            border-top: 1px solid var(--honey-light);
            font-size: 1em;
            color: var(--text);
            text-align: left;
        }
        td:first-child {
            font-weight: 600;
            color: var(--brown-dark);
        }
        td:last-child {
            color: var(--honey-dark);
            font-style: italic;
        }
        tr:hover td {
            background: #FFFBF0;
        }
        footer {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid var(--honey-light);
            font-size: 0.85em;
            color: var(--gray);
        }
        @media (max-width: 540px) {
            .container { padding: 32px 24px; border-radius: 18px; }
            h1 { font-size: 1.6em; }
            .bee { width: 110px; height: 110px; }
            th, td { padding: 12px 14px; font-size: 0.92em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bee">
            <img src="ape.png" alt="Apetta">
        </div>
        <h1>Servizio di impollinatura</h1>
        <p class="subtitle">Tariffe ufficiali dell'Apiario Allegri</p>

        <table>
            <thead>
                <tr>
                    <th>Qtà di alberi</th>
                    <th>Tariffa</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>fino a 3 alberi</td>
                    <td>gratis</td>
                </tr>
                <tr>
                    <td>da 4 a 10 alberi</td>
                    <td>un sorriso</td>
                </tr>
                <tr>
                    <td>da 11 a 20 alberi</td>
                    <td>un sorriso e uno sguardo dolce</td>
                </tr>
                <tr>
                    <td>da 21 alberi</td>
                    <td>un bacio</td>
                </tr>
            </tbody>
        </table>

        <footer>
            🐝 Le nostre api si occuperanno con piacere dei vostri alberi
        </footer>
    </div>
</body>
</html>
